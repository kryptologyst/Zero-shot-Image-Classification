# Default configuration for zero-shot image classification

# Model configuration
model:
  name: "openai/clip-vit-base-patch32"
  device: "auto"  # auto, cuda, mps, cpu
  
# Data configuration
data:
  data_dir: "data"
  batch_size: 32
  num_workers: 4
  image_size: 224
  val_split: 0.2
  test_split: 0.1

# Training configuration (for few-shot baselines)
training:
  epochs: 100
  learning_rate: 1e-4
  weight_decay: 1e-5
  scheduler: "cosine"
  warmup_epochs: 10

# Evaluation configuration
evaluation:
  top_k_values: [1, 3, 5]
  confidence_threshold: 0.1
  save_predictions: true
  save_visualizations: true

# Paths
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  assets_dir: "assets"
  results_dir: "results"

# Logging
logging:
  level: "INFO"
  log_to_file: true
  log_to_wandb: false

# Reproducibility
seed: 42
deterministic: true

# Demo configuration
demo:
  streamlit:
    port: 8501
    host: "localhost"
  gradio:
    port: 7860
    share: false
